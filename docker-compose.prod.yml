# Production: PostgreSQL + Sansta ERP (API + admin) in one stack
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.docker up -d --build

name: sansta-erp

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-sansta_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.docker}
      POSTGRES_DB: ${DB_NAME:-sansta_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DB_USER:-sansta_user} -d ${DB_NAME:-sansta_erp}',
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '3000'
    environment:
      SERVICE_FQDN_APP_3000: ''
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-sansta_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-sansta_erp}
      DIRECT_URL: postgresql://${DB_USER:-sansta_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-sansta_erp}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.docker}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      APP_URL: ${SERVICE_URL_APP_3000:-${APP_URL:-http://localhost:3000}}
      ADMIN_URL: ${SERVICE_URL_APP_3000:-${ADMIN_URL:-http://localhost:3000}}
      PUBLIC_URL: ${SERVICE_URL_APP_3000:-${PUBLIC_URL:-http://localhost:3000}}
      TENANT_BASE_DOMAIN: ${TENANT_BASE_DOMAIN:-localhost}
      TENANT_URL_PROTOCOL: ${TENANT_URL_PROTOCOL:-https}
      ADMIN_PATH: ${ADMIN_PATH:-/admin/login}
      SEED_DATABASE: ${SEED_DATABASE:-false}
    volumes:
      - uploads_data:/app/backend/uploads
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

volumes:
  postgres_data:
  uploads_data:
